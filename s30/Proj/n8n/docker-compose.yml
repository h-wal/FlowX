# Full stack: web + backend + worker. From repo root: docker compose up --build
#
# Local: .env with PORT, DATABASE_URL, REDIS_URL, JWT_KEY, CORS_ORIGIN=http://localhost:3000
# EC2:  add NEXT_PUBLIC_API_URL=http://<EC2_PUBLIC_IP>:3030 and CORS_ORIGIN=http://<EC2_PUBLIC_IP>:3000
#       then docker compose up -d --build. Open http://<EC2_PUBLIC_IP>:3000

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3030}
    image: n8n-web
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/backend_server/Dockerfile
    image: n8n-backend
    ports:
      - "3030:3030"
    env_file:
      - .env

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: n8n-worker
    env_file:
      - .env
    depends_on:
      - backend

  # Optional: local Redis. Uncomment and set REDIS_URL=redis://redis:6379 in .env to use.
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
